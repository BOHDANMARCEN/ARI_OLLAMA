<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARI Console</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #252525;
      --border: #333;
      --accent: #f97316;
      --text: #e0e0e0;
      --text2: #888;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --purple: #a855f7;
      --blue: #3b82f6;
      --teal: #14b8a6;
      --mono: 'Consolas', 'Monaco', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
    
    .app { display: grid; grid-template-columns: 280px 1fr 300px; height: 100vh; }
    
    /* LEFT PANEL */
    .left-panel { background: var(--surface); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
    
    .status-box { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--surface2); border-radius: 6px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
    .status-dot.connected { background: var(--green); }
    .status-text { font-size: 12px; color: var(--text2); }
    
    .model-info { font-size: 13px; color: var(--text); }
    .model-info span { color: var(--accent); }
    
    .tick-counter { font-family: var(--mono); font-size: 24px; font-weight: bold; color: var(--accent); }
    .tick-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
    
    .section-title { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-top: 16px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    
    .metric-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .metric-label { width: 70px; font-size: 11px; color: var(--text2); }
    .metric-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .metric-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
    .metric-val { width: 35px; font-size: 10px; color: var(--text2); text-align: right; font-family: var(--mono); }
    
    .mood-row { display: flex; gap: 16px; margin-top: 8px; }
    .mood-item { font-size: 12px; }
    .mood-item span { color: var(--accent); font-family: var(--mono); }
    
    .priority-badge { display: inline-block; padding: 4px 8px; background: var(--purple); color: white; font-size: 11px; border-radius: 4px; margin-top: 8px; }
    
    .goal-box { background: var(--surface2); padding: 10px; border-radius: 6px; margin-top: 8px; }
    .goal-text { font-size: 12px; color: var(--text); margin-bottom: 6px; }
    .goal-bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
    .goal-bar-fill { height: 100%; background: var(--green); transition: width 0.3s; }
    
    .defense-row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; }
    .memory-count { font-family: var(--mono); color: var(--teal); }
    
    /* CENTER PANEL */
    .center-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    
    .tab-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--text2); font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover { color: var(--text); }
    
    .tab-content { flex: 1; display: none; overflow: hidden; }
    .tab-content.active { display: flex; flex-direction: column; }
    
    /* CHAT TAB */
    .chat-header { display: flex; gap: 8px; padding: 12px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .session-select { flex: 1; padding: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-size: 12px; }
    .new-session-btn { padding: 8px 12px; background: var(--accent); border: none; color: white; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .new-session-btn:hover { opacity: 0.9; }
    
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { display: flex; max-width: 80%; }
    .message.user { align-self: flex-end; }
    .message.ari { align-self: flex-start; }
    .message-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .message.user .message-bubble { background: var(--accent); color: white; border-bottom-right-radius: 2px; }
    .message.ari .message-bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 2px; }
    
    .typing-indicator { display: none; padding: 8px 12px; background: var(--surface2); border-radius: 12px; width: fit-content; }
    .typing-indicator.show { display: flex; gap: 4px; }
    .typing-dot { width: 6px; height: 6px; background: var(--text2); border-radius: 50%; animation: bounce 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    
    .chat-input-area { display: flex; gap: 8px; padding: 12px; background: var(--surface); border-top: 1px solid var(--border); }
    .chat-input { flex: 1; padding: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-size: 13px; resize: none; min-height: 44px; max-height: 100px; }
    .chat-input:focus { outline: none; border-color: var(--accent); }
    .chat-input::placeholder { color: var(--text2); }
    .chat-send-btn { padding: 0 16px; background: var(--accent); border: none; color: white; border-radius: 6px; font-size: 16px; cursor: pointer; }
    .chat-send-btn:hover { opacity: 0.9; }
    .chat-send-btn:disabled { background: var(--text2); cursor: not-allowed; }
    
    /* BRAIN GRAPH TAB */
    .graph-container { flex: 1; position: relative; background: var(--bg); }
    .graph-svg { width: 100%; height: 100%; }
    .graph-tooltip { position: absolute; background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 11px; pointer-events: none; display: none; z-index: 100; }
    
    /* RIGHT PANEL */
    .right-panel { display: flex; flex-direction: column; background: var(--surface); }
    
    .voices-section { flex: 1; display: flex; flex-direction: column; padding: 12px; border-bottom: 1px solid var(--border); overflow: hidden; }
    .section-header { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    
    .voice-card { background: var(--surface2); border-radius: 6px; padding: 10px; margin-bottom: 8px; border-left: 3px solid var(--border); }
    .voice-card.explorer { border-left-color: var(--teal); }
    .voice-card.consolidator { border-left-color: var(--blue); }
    .voice-card.critic { border-left-color: var(--red); }
    .voice-name { font-size: 10px; color: var(--text2); text-transform: uppercase; margin-bottom: 4px; }
    .voice-text { font-size: 11px; color: var(--text); line-height: 1.4; font-family: var(--mono); }
    
    .events-section { flex: 1; display: flex; flex-direction: column; padding: 12px; overflow: hidden; }
    .events-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .clear-btn { font-size: 10px; color: var(--text2); background: none; border: none; cursor: pointer; }
    .clear-btn:hover { color: var(--text); }
    .events-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    
    .event { font-size: 10px; font-family: var(--mono); padding: 4px 6px; border-radius: 3px; background: var(--surface2); }
    .event.belief { border-left: 2px solid var(--yellow); }
    .event.crisis { border-left: 2px solid var(--red); background: rgba(239,68,68,0.1); }
    .event.inquiry { border-left: 2px solid var(--purple); }
    .event.spontaneous { border-left: 2px solid var(--blue); }
    .event.defense { border-left: 2px solid var(--accent); }
    .event.goal { border-left: 2px solid var(--green); }
    .event.error { border-left: 2px solid var(--red); font-weight: bold; }
    .event.voice { border-left: 2px solid var(--teal); }
    
    .event-tick { color: var(--text2); margin-right: 6px; }
    .event-type { color: var(--text2); margin-right: 6px; }
    
    /* CRISIS OVERLAY */
    .crisis-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239,68,68,0.95); padding: 20px 40px; border-radius: 8px; z-index: 1000; display: none; animation: pulse 1s infinite; }
    .crisis-overlay.show { display: block; }
    .crisis-text { color: white; font-size: 18px; font-weight: bold; letter-spacing: 2px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    
    /* RESPONSIVE */
    @media (max-width: 1200px) {
      .app { grid-template-columns: 200px 1fr; }
      .right-panel { display: none; }
    }
    @media (max-width: 800px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .left-panel { flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); max-height: 200px; }
      .status-box, .model-info, .tick-counter { flex: 1; min-width: 120px; }
      .metrics-section { display: none; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- LEFT PANEL -->
  <aside class="left-panel">
    <div class="status-box">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Disconnected</span>
    </div>
    
    <div class="model-info">
      Model: <span id="modelName">--</span>
    </div>
    
    <div>
      <div class="tick-label">Tick</div>
      <div class="tick-counter" id="tickCounter">0</div>
    </div>
    
    <div class="section-title">Metrics</div>
    <div class="metrics-section">
      <div class="metric-row">
        <span class="metric-label">Stability</span>
        <div class="metric-bar"><div class="metric-fill" id="mStability" style="width:50%"></div></div>
        <span class="metric-val" id="mStabilityVal">50%</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">Novelty</span>
        <div class="metric-bar"><div class="metric-fill" id="mNovelty" style="width:50%;background:var(--teal)"></div></div>
        <span class="metric-val" id="mNoveltyVal">50%</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">Confidence</span>
        <div class="metric-bar"><div class="metric-fill" id="mConfidence" style="width:50%;background:var(--blue)"></div></div>
        <span class="metric-val" id="mConfidenceVal">50%</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">Coherence</span>
        <div class="metric-bar"><div class="metric-fill" id="mCoherence" style="width:50%;background:var(--purple)"></div></div>
        <span class="metric-val" id="mCoherenceVal">50%</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">Conflict</span>
        <div class="metric-bar"><div class="metric-fill" id="mConflict" style="width:20%;background:var(--red)"></div></div>
        <span class="metric-val" id="mConflictVal">20%</span>
      </div>
    </div>
    
    <div class="section-title">Mood</div>
    <div class="mood-row">
      <div class="mood-item">valence: <span id="moodValence">0.00</span></div>
      <div class="mood-item">energy: <span id="moodEnergy">50%</span></div>
    </div>
    
    <div class="section-title">Priority</div>
    <div class="priority-badge" id="topPriority">--</div>
    
    <div class="section-title">Goal</div>
    <div class="goal-box">
      <div class="goal-text" id="goalText">No active goal</div>
      <div class="goal-bar"><div class="goal-bar-fill" id="goalProgress" style="width:0%"></div></div>
    </div>
    
    <div class="section-title">Defense</div>
    <div class="defense-row">
      <span>Defense:</span>
      <span id="defenseLevel" style="color:var(--green)">open</span>
    </div>
    <div class="defense-row">
      <span>Memory:</span>
      <span class="memory-count" id="memoryCount">0</span>
    </div>
  </aside>
  
  <!-- CENTER PANEL -->
  <main class="center-panel">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="chat">Chat</button>
      <button class="tab-btn" data-tab="graph">Brain Graph</button>
    </div>
    
    <!-- CHAT TAB -->
    <div class="tab-content active" id="chatTab">
      <div class="chat-header">
        <select class="session-select" id="sessionSelect">
          <option>Select session...</option>
        </select>
        <button class="new-session-btn" id="newSessionBtn">+ New</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" placeholder="Message ARI..." rows="1"></textarea>
        <button class="chat-send-btn" id="sendBtn">↑</button>
      </div>
    </div>
    
    <!-- GRAPH TAB -->
    <div class="tab-content" id="graphTab">
      <div class="graph-container">
        <svg class="graph-svg" id="graphSvg"></svg>
        <div class="graph-tooltip" id="graphTooltip"></div>
      </div>
    </div>
  </main>
  
  <!-- RIGHT PANEL -->
  <aside class="right-panel">
    <div class="voices-section">
      <div class="section-header">Voices</div>
      <div class="voice-card explorer">
        <div class="voice-name">Explorer</div>
        <div class="voice-text" id="voiceExplorer">--</div>
      </div>
      <div class="voice-card consolidator">
        <div class="voice-name">Consolidator</div>
        <div class="voice-text" id="voiceConsolidator">--</div>
      </div>
      <div class="voice-card critic">
        <div class="voice-name">Critic</div>
        <div class="voice-text" id="voiceCritic">--</div>
      </div>
    </div>
    
    <div class="events-section">
      <div class="events-header">
        <span class="section-header" style="margin:0;border:none;padding:0;">Event Log</span>
        <button class="clear-btn" id="clearLog">Clear</button>
      </div>
      <div class="events-list" id="eventsList"></div>
    </div>
  </aside>
</div>

<!-- CRISIS OVERLAY -->
<div class="crisis-overlay" id="crisisOverlay">
  <div class="crisis-text">⚠️ CRISIS MODE</div>
</div>

<script>
// ================== STATE ==================
const state = {
  connected: false,
  tick: 0,
  model: '',
  sessions: [],
  currentSessionId: null,
  currentMessage: null,
  messages: [],
  latestVoices: {},
  graph: null,
  reconnectAttempts: 0
};

let ws = null;

// ================== API ==================
async function apiGet(path) {
  const res = await fetch(path);
  return res.json();
}

async function apiPost(path, body = {}) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

// ================== WEBSOCKET ==================
function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}/ws`);
  
  ws.onopen = () => {
    state.connected = true;
    state.reconnectAttempts = 0;
    updateStatus();
    loadData();
  };
  
  ws.onclose = () => {
    state.connected = false;
    updateStatus();
    state.reconnectAttempts++;
    if (state.reconnectAttempts < 10) {
      setTimeout(connect, 3000);
    }
  };
  
  ws.onerror = (e) => {
    console.error('WS error:', e);
  };
  
  ws.onmessage = (e) => {
    try {
      const evt = JSON.parse(e.data);
      handleEvent(evt);
    } catch (err) {
      console.error('Parse error:', err);
    }
  };
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

// ================== EVENT HANDLER ==================
function handleEvent(evt) {
  switch (evt.type) {
    case 'tick_start':
      state.tick = evt.tick;
      document.getElementById('tickCounter').textContent = evt.tick;
      break;
      
    case 'voice':
      state.latestVoices[evt.name] = evt.text;
      updateVoiceCard(evt.name, evt.text);
      addEvent('voice', `${evt.name}: ${evt.text?.substring(0, 30)}...`);
      break;
      
    case 'synthesis':
      addEvent('synthesis', evt.text?.substring(0, 50));
      break;
      
    case 'response_start':
      state.currentMessage = { role: 'ari', text: '', tick: evt.tick };
      document.getElementById('typingIndicator').classList.add('show');
      break;
      
    case 'response_token':
      if (state.currentMessage) {
        state.currentMessage.text += evt.token || '';
        updateLastMessage();
      }
      break;
      
    case 'response_end':
      if (state.currentMessage) {
        finalizeMessage();
        document.getElementById('typingIndicator').classList.remove('show');
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('chatInput').disabled = false;
      }
      break;
      
    case 'brain_graph':
      state.graph = evt.graph;
      renderGraph(evt.graph);
      if (evt.graph?.meta) updateMetrics(evt.graph.meta);
      break;
      
    case 'brain_snapshot':
      if (evt.snapshot?.state_vector) updateMetrics(evt.snapshot.state_vector);
      if (evt.snapshot?.mood) updateMood(evt.snapshot.mood);
      if (evt.snapshot?.goal) updateGoal(evt.snapshot.goal, evt.snapshot.goal_progress);
      if (evt.snapshot?.priorities) updatePriority(evt.snapshot.priorities);
      if (evt.voices) {
        Object.entries(evt.voices).forEach(([name, text]) => updateVoiceCard(name, text));
      }
      break;
      
    case 'goal':
      updateGoal(evt.text, evt.progress);
      break;
      
    case 'belief':
      addEvent('belief', evt.text?.substring(0, 40));
      break;
      
    case 'crisis':
      addEvent('crisis', evt.message || 'Conflict detected');
      document.getElementById('crisisOverlay').classList.add('show');
      if (evt.removed) addEvent('crisis', `Removed: ${evt.removed.join(', ')}`);
      break;
      
    case 'inquiry':
      addEvent('inquiry', evt.question?.substring(0, 40));
      break;
      
    case 'spontaneous':
      addEvent('spontaneous', evt.topic?.substring(0, 40));
      break;
      
    case 'defense':
      updateDefense(evt.level);
      addEvent('defense', `Level: ${(evt.level || 0).toFixed(2)}`);
      break;
      
    case 'memory_snapshot':
      document.getElementById('memoryCount').textContent = evt.total || 0;
      break;
      
    case 'status':
      state.model = evt.model || state.model;
      document.getElementById('modelName').textContent = state.model;
      updateStatus(evt.phase);
      break;
      
    case 'history_snapshot':
      state.sessions = evt.sessions || [];
      renderSessions();
      break;
      
    case 'error':
      addEvent('error', evt.message);
      break;
  }
}

function updateStatus(phase) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (state.connected && phase === 'running') {
    dot.classList.add('connected');
    text.textContent = 'Connected';
  } else if (state.connected) {
    dot.classList.add('connected');
    text.textContent = 'Idle';
  } else {
    dot.classList.remove('connected');
    text.textContent = 'Disconnected';
  }
}

// ================== DATA LOADING ==================
async function loadData() {
  try {
    const status = await apiGet('/api/status');
    state.model = status.model;
    state.tick = status.tick || 0;
    document.getElementById('modelName').textContent = state.model;
    document.getElementById('tickCounter').textContent = state.tick;
    updateStatus(status.state);
    
    const history = await apiGet('/api/history');
    state.sessions = history.sessions || [];
    renderSessions();
    if (state.sessions.length > 0 && !state.currentSessionId) {
      selectSession(state.sessions[0].id);
    }
  } catch (e) {
    console.error('Load error:', e);
  }
}

// ================== SESSIONS ==================
function renderSessions() {
  const select = document.getElementById('sessionSelect');
  select.innerHTML = state.sessions.length 
    ? state.sessions.map(s => `<option value="${s.id}" ${s.id === state.currentSessionId ? 'selected' : ''}>${s.title || 'Chat'}</option>`).join('')
    : '<option>No sessions</option>';
}

async function selectSession(id) {
  state.currentSessionId = id;
  const session = state.sessions.find(s => s.id === id);
  if (session) {
    document.getElementById('chatMessages').innerHTML = '';
    (session.messages || []).forEach(m => {
      const div = document.createElement('div');
      div.className = `message ${m.role}`;
      div.innerHTML = `<div class="message-bubble">${escapeHtml(m.text)}</div>`;
      document.getElementById('chatMessages').appendChild(div);
    });
  }
}

async function createSession() {
  try {
    const data = await apiPost('/api/history/sessions', { title: 'New chat' });
    state.sessions = data.sessions || state.sessions;
    state.currentSessionId = data.session?.id;
    renderSessions();
  } catch (e) {
    console.error('Create session error:', e);
  }
}

// ================== CHAT ==================
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function addMessage(msg) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `message ${msg.role}`;
  div.innerHTML = `<div class="message-bubble">${escapeHtml(msg.text)}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function updateLastMessage() {
  const container = document.getElementById('chatMessages');
  const last = container.lastElementChild;
  if (last && last.classList.contains('message') && last.classList.contains('ari')) {
    last.querySelector('.message-bubble').textContent = state.currentMessage?.text || '';
  }
  container.scrollTop = container.scrollHeight;
}

function finalizeMessage() {
  if (state.currentMessage && state.currentMessage.text) {
    addMessage(state.currentMessage);
  }
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !state.currentSessionId) return;
  
  const userMsg = { role: 'user', text };
  addMessage(userMsg);
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  
  send({ type: 'user_message', text, session_id: state.currentSessionId });
}

// ================== VOICES ==================
function updateVoiceCard(name, text) {
  const id = name === 'Explorer' ? 'voiceExplorer' : name === 'Consolidator' ? 'voiceConsolidator' : 'voiceCritic';
  const el = document.getElementById(id);
  if (el) el.textContent = text?.substring(0, 100) || '--';
}

// ================== METRICS ==================
function updateMetrics(meta) {
  const sv = meta || {};
  const setMetric = (id, val) => {
    const v = Math.round((val || 0) * 100);
    const bar = document.getElementById(id);
    const txt = document.getElementById(id + 'Val');
    if (bar) bar.style.width = v + '%';
    if (txt) txt.textContent = v + '%';
  };
  setMetric('mStability', sv.stability);
  setMetric('mNovelty', sv.novelty);
  setMetric('mConfidence', sv.confidence);
  setMetric('mCoherence', sv.coherence);
  setMetric('mConflict', sv.conflict);
}

function updateMood(mood) {
  if (mood) {
    document.getElementById('moodValence').textContent = (mood.valence || 0).toFixed(2);
    document.getElementById('moodEnergy').textContent = Math.round((mood.energy || 0.5) * 100) + '%';
  }
}

function updatePriority(priorities) {
  if (priorities?.top) {
    document.getElementById('topPriority').textContent = priorities.top;
  }
}

function updateGoal(text, progress) {
  document.getElementById('goalText').textContent = text || 'No active goal';
  document.getElementById('goalProgress').style.width = Math.round((progress || 0) * 100) + '%';
}

function updateDefense(level) {
  const el = document.getElementById('defenseLevel');
  if (el) {
    if (level > 0.5) {
      el.textContent = 'guarded';
      el.style.color = 'var(--red)';
    } else {
      el.textContent = 'open';
      el.style.color = 'var(--green)';
    }
  }
}

// ================== EVENTS ==================
function addEvent(type, text) {
  const list = document.getElementById('eventsList');
  const div = document.createElement('div');
  div.className = `event ${type}`;
  div.innerHTML = `<span class="event-tick">[${state.tick}]</span><span class="event-type">${type}:</span>${escapeHtml(text)}`;
  list.appendChild(div);
  while (list.children.length > 50) list.removeChild(list.firstChild);
  list.scrollTop = list.scrollHeight;
}

// ================== GRAPH ==================
let graphSim = null;

function renderGraph(data) {
  if (!data?.nodes?.length) return;
  
  const svg = d3.select('#graphSvg');
  const container = document.getElementById('graphTab');
  const width = container.clientWidth;
  const height = container.clientHeight;
  
  svg.attr('viewBox', `0 0 ${width} ${height}`);
  
  const colorMap = {
    core: '#c8851a', voice: '#f97316', identity: '#7c5cbf',
    thought: '#a855f7', goal: '#22c55e', belief: '#eab308',
    memory: '#4a4845', meta: '#00ffff', system: '#84cc46'
  };
  
  const nodes = data.nodes.map(n => ({ ...n }));
  const links = data.links || [];
  
  svg.selectAll('*').remove();
  
  if (!graphSim) {
    graphSim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(80))
      .force('charge', d3.forceManyBody().strength(-150))
      .force('center', d3.forceCenter(width/2, height/2))
      .force('collision', d3.forceCollide(20));
  } else {
    graphSim.nodes(nodes);
    graphSim.force('link').links(links);
    graphSim.alpha(0.3).restart();
  }
  
  const link = svg.append('g')
    .selectAll('line').data(links).join('line')
    .attr('stroke', '#333').attr('stroke-opacity', 0.5)
    .attr('stroke-width', d => d.strength || 1);
  
  const node = svg.append('g')
    .selectAll('circle').data(nodes).join('circle')
    .attr('r', d => Math.sqrt(d.value || 5) * 3)
    .attr('fill', d => colorMap[d.group] || '#666')
    .call(d3.drag()
      .on('start', e => { graphSim.alphaTarget(0.3).restart(); e.fx = e.x; e.fy = e.y; })
      .on('drag', e => { e.fx = e.x; e.fy = e.y; })
      .on('end', e => { graphSim.alphaTarget(0); e.fx = null; e.fy = null; }));
  
  const label = svg.append('g')
    .selectAll('text').data(nodes).join('text')
    .text(d => d.label || d.id)
    .attr('font-size', 8).attr('fill', '#888').attr('text-anchor', 'middle');
  
  node.append('title').text(d => `${d.id}\n${d.group}`);
  
  graphSim.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('cx', d => d.x).attr('cy', d => d.y);
    label.attr('x', d => d.x).attr('y', d => d.y + 15);
  });
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
  });
});

document.getElementById('sessionSelect').addEventListener('change', e => selectSession(e.target.value));
document.getElementById('newSessionBtn').addEventListener('click', createSession);
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('clearLog').addEventListener('click', () => {
  document.getElementById('eventsList').innerHTML = '';
});

document.getElementById('chatInput').disabled = false;

// ================== INIT ==================
connect();
